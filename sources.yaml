sources:
  - https://iptv-org.github.io/iptv/index.m3u
  - https://raw.githubusercontent.com/fanmingming/live/main/tv/m3u/global.m3u
  - https://raw.githubusercontent.com/fanmingming/live/main/tv/m3u/ipv6.m3u
  - https://raw.githubusercontent.com/YanG-1989/m3u/main/Gather.m3u
  - https://raw.githubusercontent.com/joevess/IPTV/main/iptv.m3u8
  - https://raw.githubusercontent.com/vbskycn/iptv/master/tv/iptv4.m3u
  - https://raw.githubusercontent.com/imDazui/Tvlist-awesome-m3u-m3u8/master/IPTV.m3u
  - https://raw.githubusercontent.com/Guovin/iptv-api/gd/output/result.m3u

# 频道严格白名单 + 排序顺序（顺序就是 m3u 里的展示顺序）
# 匹配规则：去掉括号/空格/破折号后大小写不敏感（CCTV-1 / CCTV 1 / CCTV-1 (720p) 都等同 CCTV1）
channels:
  - CCTV1
  - CCTV2
  - CCTV3
  - CCTV4
  - CCTV5
  - CCTV6
  - CCTV7
  - CCTV8
  - CCTV9
  - CCTV10
  - CCTV11
  - CCTV12
  - CCTV13
  - 凤凰中文
  - 凤凰香港

filter:
  # 按 tvg-id 后缀的国家码过滤（iptv-org 源会带 .cn@/.us@/.jp@）
  allowed_countries: [cn, hk, tw, mo]

# 每个频道（归一化名）最多保留前 N 个最快 URL
limits:
  max_per_channel: 1

probe:
  timeout_seconds: 4
  workers: 64
  fetch_timeout_seconds: 10
  segment_read_bytes: 65536
  # 50 KB/s ≈ 400 Kbps，SD 都能跑
  min_kbps: 50
  max_latency_ms: 3000
  keep_non_http: false

blacklist_domains: []
